spring.application.name=Student_Attendance
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.tomcat.remoteip.protocol-header=x-forwarded-proto
#SAFETY SETTING
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.MySQL8Dialect
spring.thymeleaf.cache=false

#MAIL CONFIGURATION
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

#App contacts
app.contact.phone=${CONTACT_PHONE:+919876543210}
app.contact.website=${CONTACT_WEB:https://www.google.com}
app.contact.email=${CONTACT_EMAIL:rsgcAS36@gmail.com}
