<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
   <title th:text="${student.id == 0} ? 'Add New Student Profile' : 'Edit Student Profile Details'">Student Profile Configuration</title>
   <th:block th:replace="~{fragments/header :: common-head}"></th:block>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" >
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" >
     
  <style>
    body {
      background: #f5f7fa; /* Uniform App Slate Light Background */
    }
    .navbar-custom {
      background-color: #1e293b; /* Premium Dark Slate Professional Layout Navbar */
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .form-container-card {
      border: none;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      border-radius: 16px;
      background: white;
    }
    .section-header-box {
      border-bottom: 1px solid #f1f5f9;
    }
    .custom-input-group {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .form-label-custom {
      font-weight: 600;
      color: #334155;
      font-size: 0.88rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-control-custom {
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      padding: 11px 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .form-control-custom:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .action-bar-footer {
      border-top: 1px solid #f1f5f9;
      background-color: #fafafa;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
    }
  </style>
</head>
<body class="pb-5">

  <!-- NAVBAR COMPONENT -->
  <nav class="navbar navbar-dark navbar-custom px-3 py-3 mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold fs-5">
        <i class="bi bi-shield-check text-primary me-2"></i>Attendance System
      </span>
      <div>
        <a th:href="@{/classes/students(classId=${classId})}" class="btn btn-outline-light btn-sm rounded-pill px-3 fw-semibold">
          <i class="bi bi-arrow-left me-1"></i> Back to Roster
        </a>
      </div>
    </div>
  </nav>

  <div class="container" style="max-width: 650px;">

    <!-- MAIN FORM CARD WRAPPER -->
    <div class="card form-container-card mt-4">
      
      <!-- CARD HEADER STATE DYNAMICS -->
      <div class="p-4 section-header-box bg-light rounded-top-4">
        <h3 class="fw-bold text-dark mb-1" th:text="${student.id == 0} ? '➕ Add New Student' : '✏️ Edit Student Profile'">
          Add Student
        </h3>
        <p class="text-muted small mb-0">Create or modify student credentials and database roster logs accurately.</p>
      </div>

      <!-- SYSTEM FORM CONFIGURATION -->
      <form th:action="@{/classes/students/save}" th:object="${student}" method="post">
        
        <!-- HIDDEN PARAMS FOR UPDATE ROUTING -->
        <input type="hidden" th:field="*{id}">
		
		<input type="hidden" name="classId" th:value="${classId}" id="classId">
		
        <div class="p-4">

          <!-- CONTAINER CONTAINER FOR ROSTER FIELD DATA -->
          <div class="custom-input-group shadow-sm">
            
            <!-- ROLL NUMBER FIELD -->
            <div class="mb-3.5">
              <label class="form-label form-label-custom" for="rollNo">
                <i class="bi bi-hash text-primary me-1"></i> Roll Number / Registration ID
              </label>
              <input type="text" th:field="*{rollNo}" class="form-control form-control-custom font-monospace fw-bold" 
			  placeholder="e.g., 25PCS6306" th:readonly="${student.id>0}" required>
            </div>

            <!-- STUDENT FULL NAME FIELD -->
            <div class="mb-3.5 mt-3">
              <label class="form-label form-label-custom" for="name">
                <i class="bi bi-person-fill text-secondary me-1"></i> Full Name
              </label>
              <input type="text" th:field="*{name}" class="form-control form-control-custom" placeholder="e.g., STUDENT S" required>
            </div>

            <!-- EMAIL ADDRESS FIELD -->
            <div class="mb-0 mt-3">
              <label class="form-label form-label-custom" for="email">
                <i class="bi bi-envelope-fill text-secondary me-1"></i> Email Address
              </label>
              <input type="email" th:field="*{email}" class="form-control form-control-custom" placeholder="e.g., studentname@college.edu" required>
            </div>

          </div>

          <small class="text-muted d-block mt-1 px-1">
            <i class="bi bi-info-circle me-1"></i> System updates here synchronize instantly with student dashboard portal visibility.
          </small>

        </div>

        <!-- ACTION FOOTER TOOLBAR BUTTONS -->
        <div class="p-3 px-4 d-flex justify-content-end gap-2.5 action-bar-footer">
          <a th:href="@{/classes/students(classId=${classId})}" class="btn btn-light border rounded-pill px-4 fw-semibold text-secondary">
            Cancel
          </a>
          <button type="submit" class="btn btn-success rounded-pill px-4 fw-bold shadow-sm">
            <i class="bi bi-cloud-check-fill me-1"></i> Save Student Record
          </button>
        </div>

      </form>

    </div>

  </div>

  <!-- Bootstrap 5.3.3 JS Bundle CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
