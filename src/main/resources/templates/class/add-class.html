<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <title th:text="${classEntity.id == 0} ? 'Add New Class' : 'Edit Class Details'">Class Configuration Portal</title>
  <th:block th:replace="~{fragments/header :: common-head}"></th:block>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" >
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" >
    
  <style>
    body {
      background: #f5f7fa; /* Uniform App Slate Light Background */
    }
    .navbar-custom {
      background-color: #1e293b; /* Premium Dark Slate Professional Layout Navbar */
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .form-container-card {
      border: none;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      border-radius: 16px;
      background: white;
    }
    .section-header-box {
      border-bottom: 1px solid #f1f5f9;
    }
    .custom-input-group {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .form-label-custom {
      font-weight: 600;
      color: #334155;
      font-size: 0.88rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-control-custom {
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      padding: 10px 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .form-control-custom:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .form-control-disabled {
      background-color: #e2e8f0 !important;
      color: #475569 !important;
      font-weight: 600;
      cursor: not-allowed;
    }
    .action-bar-footer {
      border-top: 1px solid #f1f5f9;
      background-color: #fafafa;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
    }
  </style>
</head>
<body class="pb-5">

  <nav class="navbar navbar-dark navbar-custom px-3 py-3 mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold fs-5">
        <i class="bi bi-shield-check text-primary me-2"></i>Attendance System
      </span>
      <div>
        <a th:href="@{/classes(departmentId=${department.id})}" class="btn btn-outline-light btn-sm rounded-pill px-3 fw-semibold">
          <i class="bi bi-arrow-left me-1"></i> Back to Classes
        </a>
      </div>
    </div>
  </nav>

  <div class="container" style="max-width: 680px;">

    <div class="card form-container-card mt-4">
      
      <div class="p-4 section-header-box bg-light rounded-top-4">
        <h3 class="fw-bold text-dark mb-1" th:text="${classEntity.id == 0} ? '➕ Add New Class' : '✏️ Edit Class Details'">
          Add Class
        </h3>
        <p class="text-muted small mb-0">Configure classroom layout properties and shifts fields allocation safely.</p>
      </div>

      <form th:action="@{/classes/save}" th:object="${classEntity}" method="post">
        
        <input type="hidden" th:field="*{id}">
        <input type="hidden" id="departmentId" name="departmentId" th:value="${department.id}">

        <div class="p-4">

          <div class="mb-3">
            <label class="form-label form-label-custom"><i class="bi bi-building me-1 text-primary"></i> Parent Department</label>
            <input th:value="${department.name}" class="form-control form-control-custom form-control-disabled" readonly disabled>
          </div>

          <div class="custom-input-group shadow-sm">
            
            <div class="mb-3.5">
              <label class="form-label form-label-custom" for="course"><i class="bi bi-book-half me-1 text-secondary"></i> Course Name</label>
              <input type="text" th:field="*{course}" class="form-control form-control-custom" placeholder="e.g., B.Sc CS, B.Com" required>
            </div>

            <div class="row mt-3">
              <div class="col-sm-6 mb-3 mb-sm-0">
                <label class="form-label form-label-custom" for="year"><i class="bi bi-calendar-event me-1 text-secondary"></i> Academic Year</label>
                <input type="number" min="1" max="4" th:field="*{year}" class="form-control form-control-custom" placeholder="e.g., 1, 2, 3" required>
              </div>

              <div class="col-sm-6">
                <label class="form-label form-label-custom" for="shift"><i class="bi bi-brightness-high me-1 text-secondary"></i> Class Shift</label>
                <select th:field="*{shift}" class="form-select form-control-custom" required>
                  <option value="">-- Select Option --</option>
                  <option value="MORNING">☀️ MORNING</option>
                  <option value="EVENING">🌙 EVENING</option>
                </select>
              </div>
            </div>

          </div>

          <small class="text-muted d-block mt-n2 mb-2 px-1">
            <i class="bi bi-info-circle me-1"></i> Ensure course abbreviations align exactly with university database registry guidelines.
          </small>

        </div>

        <div class="p-3 px-4 d-flex justify-content-end gap-2.5 action-bar-footer">
          <a th:href="@{/classes(departmentId=${department.id})}" class="btn btn-light border rounded-pill px-4 fw-semibold text-secondary">
            Cancel
          </a>
          <button type="submit" class="btn btn-success rounded-pill px-4 fw-bold shadow-sm">
            <i class="bi bi-cloud-check-fill me-1"></i> Save Class Configuration
          </button>
        </div>

      </form>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bundle.min.js"></script>
  
</body>
</html>
