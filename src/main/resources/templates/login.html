<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Sign In</title>
	<th:block th:replace="~{fragments/header :: common-head}"></th:block>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" >
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800 antialiased">

    <div class="bg-white rounded-xl border border-slate-200 shadow-xl max-w-sm w-full p-6 sm:p-8 space-y-6">
        
        <div class="text-center space-y-1.5">
            <h2 class="text-xl font-bold tracking-tight text-slate-900">Faculty Console</h2>
            <p class="text-xs text-slate-400 font-medium">Enter your credentials to unlock dashboard modules.</p>
        </div>

        <div th:if="${param.error}" class="p-3 border-l-4 border-red-500 bg-red-50 rounded-r-lg flex items-start gap-2.5 mb-2">
            <span class="text-red-500 text-sm mt-0.5">
                <i class="fa-solid fa-circle-exclamation"></i>
            </span>
            <div>
                <h5 class="text-xs font-bold text-red-800 uppercase tracking-wide">Login Failed</h5>
                <p class="text-[11px] font-semibold text-red-600 mt-0.5">
                    Invalid username or password handle. Check your credentials parameters tracking logs!
                </p>
            </div>
        </div>

        <form th:action="@{/login}" method="post" class="space-y-4">
            
            <div class="space-y-1">
                <label class="text-xs font-bold tracking-wider text-slate-400 uppercase">Username</label>
                <div class="relative flex items-center">
                    <span class="absolute left-3 text-slate-400 text-sm"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="username" class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-9 pr-4 py-2 text-sm font-medium focus:outline-none focus:border-blue-500 transition-colors" placeholder="Enter faculty username ID..." required>
                </div>
            </div>

            <div class="space-y-1">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold tracking-wider text-slate-400 uppercase">Password</label>
                    <a th:href="@{/forgot-password}" class="text-[11px] font-bold text-blue-600 hover:underline">Forgot?</a>
                </div>
                <div class="relative flex items-center">
                    <span class="absolute left-3 text-slate-400 text-sm"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-9 pr-4 py-2 text-sm font-medium focus:outline-none focus:border-blue-500 transition-colors" placeholder="••••••••" required>
                </div>
            </div>

			<div class="space-y-1">
			    <div class="flex justify-between items-center">
			        <label class="text-xs font-bold tracking-wider text-slate-400 uppercase">Verify your not a robot:</label>
					<b th:text="${num1}+' + '+${num2}+' = ?'"></b>
			    </div>
			    <div class="relative flex items-center">
			        <input type="number" name="answer" class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-9 pr-4 py-2 text-sm font-medium focus:outline-none focus:border-blue-500 transition-colors" placeholder="0" required>
			    </div>
			</div>
			

            <div class="pt-2">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-2.5 text-sm font-bold shadow-md transition-colors cursor-pointer">
                    Authenticate Identity
                </button>
            </div>

        </form>

    </div>

</body>
</html>
