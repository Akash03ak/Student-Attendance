<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Account Recovery</title>
	<th:block th:replace="~{fragments/header :: common-head}"></th:block>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl border p-6 max-w-md w-full shadow-lg space-y-4">
        <div class="text-center"><h2 class="text-xl font-bold">Account Recovery</h2><p class="text-xs text-slate-400">OTP dispatched send to your registered email</p></div>
        <div th:if="${error}" class="p-3 bg-red-50 text-red-700 rounded text-sm font-semibold" th:text="${error}"></div>
        <form th:action="@{/forgot-password}" method="post" class="space-y-4">
            <div><label class="text-xs font-bold text-slate-400">USERNAME</label>
				<input type="text" name="username" class="w-full bg-slate-50 border p-2.5 rounded text-sm" required autofocus>
			</div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded py-2.5 text-sm font-bold shadow cursor-pointer">Generate OTP</button>
        </form>
    </div>
</body>
</html>
