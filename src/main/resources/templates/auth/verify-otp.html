<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Account Recovery</title>
	<th:block th:replace="~{fragments/header :: common-head}"></th:block>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl border p-6 max-w-md w-full shadow-lg space-y-4">
        <div class="text-center"><h2 class="text-xl font-bold">Token Verification</h2></div>
        <div th:if="${success}" class="p-3 bg-green-50 text-green-700 rounded text-sm" th:text="${success}"></div>
        <div th:if="${error}" class="p-3 bg-red-50 text-red-700 rounded text-sm" th:text="${error}"></div>
        <form th:action="@{/verify-otp}" method="post" class="space-y-4">
            <div><label class="text-xs font-bold text-slate-400">ENTER RECEIVED OTP CODE</label>
				<input type="number" name="userOTP" class="w-full bg-slate-50 border p-2.5 rounded text-center text-lg font-bold tracking-widest" 
				placeholder="******" required autofocus></div>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white rounded py-2.5 text-sm font-bold shadow cursor-pointer">Verify OTP</button>
        </form>
    </div>
</body>
</html>
