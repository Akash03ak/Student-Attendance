<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify OTP</title>
	<th:block th:replace="~{fragments/header :: common-head}"></th:block>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" >
	  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" >
	  
	<style>

        body{
            background:linear-gradient(135deg,#198754,#6fdd8b);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center; }

        .verify-card{
            width:420px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.3);}

        .logo{font-size:60px;}
    </style>
</head>

<body>

<div class="card verify-card p-4">

    <div class="text-center">
        <div class="logo">🔐 </div>
        <h3 class="fw-bold">Verify OTP</h3>
        <p class="text-muted">Enter the OTP sent to your registered email</p>
    </div>

    <form th:action="@{/student-verify-otp}" method="post">
		
		<input type="hidden" name="rollnumber" th:value="${rollnumber}">

        <div class="mb-3">
            <label class="form-label"> One Time Password
            </label>
            <input type="text" name="otp" class="form-control form-control-lg text-center" 
			placeholder="Enter 6-Digit OTP" maxlength="6" required autofocus>
        </div>

        <button class="btn btn-success w-100 btn-lg" type="submit">
            Verify OTP
        </button>
    </form>

    <div class="text-center mt-4">
        <small class="text-muted">Didn't receive the OTP?</small>
		<br>
		<a th:href="@{/student-login}" class="text-decoration-none">Resend OTP</a>
    </div>

</div>

</body>
</html>
