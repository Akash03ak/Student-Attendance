<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Account Recovery</title>
	<th:block th:replace="~{fragments/header :: common-head}"></th:block>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl border p-6 max-w-md w-full shadow-lg space-y-4">
        <div class="text-center"><h2 class="text-xl font-bold">Overwrite Password</h2></div>
        <div th:if="${error}" class="p-3 bg-red-50 text-red-700 rounded text-sm" th:text="${error}"></div>
        <div th:if="${successPasswordReset}" class="p-3 bg-green-50 text-green-700 rounded text-sm">
            <p th:text="${successPasswordReset}"></p>
            <a th:href="@{/login}" class="text-blue-600 font-bold hover:underline block mt-2 text-xs">Back to Login</a>
        </div>
        <form th:action="@{/reset-password}" method="post" class="space-y-4" th:if="${successPasswordReset == null}">
            <div><label class="text-xs font-bold text-slate-400">NEW PASSWORD</label><input type="password" name="newPassword" minlength="8" class="w-full bg-slate-50 border p-2.5 rounded text-sm" required></div>
            <div><label class="text-xs font-bold text-slate-400">CONFIRM NEW PASSWORD</label><input type="password" name="confirmPassword" minlength="8" class="w-full bg-slate-50 border p-2.5 rounded text-sm" required></div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded py-2.5 text-sm font-bold shadow cursor-pointer">Commit Changes</button>
        </form>
    </div>
</body>
</html>
