<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
		<head>
				<title>Announcements</title>				
				<th:block th:replace="~{fragments/header :: common-head}"></th:block>
				<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" >
				  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" >
				  		
		</head>

<body class="bg-light">
	<div class="container mt-5">
		<div class="card shadow">		
			<div class="card-header bg-dark text-white d-flex justify-content-between">			
				<h3>Announcements</h3>				
				<a th:href="@{/admin/create-anounce}"				
				class="btn btn-success">				
				+ Create				
				</a>			
			</div>	
					
			<div class="card-body">			
				<table class="table table-bordered table-hover">				
					<thead class="table-primary">					
						<tr>				
							<th>S.No</th>							
							<th>Title</th>							
							<th>Description</th>							
							<th>Acion</th>						
						</tr>					
					</thead>
				
					<tbody th:each="a , size : ${announcement}">				
						<tr >						
							<td th:text="${size.count}"></td>							
							<td th:text="${a.title}"></td>							
							<td th:text="${a.description}"></td>
							<td>	
								<form th:action="@{/admin/delete-anounce/{id}(id=${a.id})}" method="post">
									<button type="submit" onclick="return confirm('Are you absolutely sure you want to delete announcement.');"
									        class="btn btn-outline-danger btn-sm d-flex align-items-center gap-1 fw-semibold px-3 py-1.5 transition">
											<i class="fa-solid fa-trash-can"></i>Delete
									</button>
								</form>																		
							</td>						
						</tr>				
					</tbody>				
				</table>			
			</div>		
		</div>	
	</div>
</body>

</html>
