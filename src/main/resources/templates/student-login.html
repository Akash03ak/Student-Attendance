<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Student Login</title>
<th:block th:replace="~{fragments/header :: common-head}"></th:block>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" >
    <style>

        body{

            background:linear-gradient(135deg,#198754,#6fdd8b);

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        .login-card{

            width:420px;

            border-radius:20px;

            box-shadow:0 10px 25px rgba(0,0,0,.3);

        }

        .logo{

            font-size:60px;

        }

    </style>

</head>

<body>

<div class="card login-card p-4">

    <div class="text-center">

        <div class="logo">

            👨‍🎓

        </div>

        <h3 class="fw-bold">

            Student Portal

        </h3>

        <p class="text-muted">

            OTP Based Secure Login

        </p>

    </div>
	
	<div th:if="${error}" class="p-3 border-l-4 border-red-500 bg-red-50 rounded-r-lg flex items-start gap-2.5 mb-2">
	           <span class="text-red-500 text-sm mt-0.5">
	               <i class="fa-solid fa-circle-exclamation"></i>
	           </span>
	           <div>
	               <h5 class="text-xs font-bold text-red-800 uppercase tracking-wide">Login Failed</h5>
	               <p class="text-[11px] font-semibold text-red-600 mt-0.5" th:text="${error}">
	                   Invalid username. Check your credentials parameters tracking logs!
	               </p>
	           </div>
	       </div>

    <form th:action="@{/student-send-otp}" method="post">

        <div class="mb-4">

            <label class="form-label">

                Roll Number

            </label>

            <input

                    type="text"

                    name="username"

                    class="form-control"

                    placeholder="Enter Roll Number"

                    required>

        </div>

        <button class="btn btn-success w-100" type="submit">

            Send OTP

        </button>

    </form>

    <div class="text-center mt-4">

        <small class="text-muted">

            OTP will dispatch to your registered email

        </small>

    </div>

</div>

</body>

</html>
