<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
   <title th:text="${department.id==0}? 'Add New Department':'Edit Department'">Add New Department - Configuration</title>
   <th:block th:replace="~{fragments/header :: common-head}"></th:block>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" >
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" >
     
  <style>
    body {
      background: #f5f7fa; /* Uniform App Slate Light Background */
    }
    .navbar-custom {
      background-color: #1e293b; /* Premium Dark Slate Professional Layout Navbar */
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .form-container-card {
      border: none;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      border-radius: 16px;
      background: white;
    }
    .section-header-box {
      border-bottom: 1px solid #f1f5f9;
    }
    .custom-input-group {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .form-label-custom {
      font-weight: 600;
      color: #334155;
      font-size: 0.88rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .form-control-custom {
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      padding: 12px 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .form-control-custom:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .action-bar-footer {
      border-top: 1px solid #f1f5f9;
      background-color: #fafafa;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
    }
    .toast-container-custom {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1055;
    }
  </style>
</head>
<body class="pb-5">

  <!-- NAVBAR COMPONENT -->
  <nav class="navbar navbar-dark navbar-custom px-3 py-3 mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold fs-5">
        <i class="bi bi-shield-check text-primary me-2"></i>Attendance System
      </span>
      <div>
        <a href="/departments" class="btn btn-outline-light btn-sm rounded-pill px-3 fw-semibold">
          <i class="bi bi-arrow-left me-1"></i> Back to Departments
        </a>
      </div>
    </div>
  </nav>

  <!-- ERROR NOTIFICATION TOAST OVERLAY -->
  <div class="toast-container-custom" th:if="${error}">
    <div id="toast" class="alert alert-danger shadow border-0 p-3 mb-2 rounded-3">
      <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}">Error Message</span>
    </div>
  </div>

  <div class="container" style="max-width: 600px;">

    <!-- MAIN FORM CARD WRAPPER -->
    <div class="card form-container-card mt-5">
      
      <!-- CARD HEADER LAYOUT -->
      <div class="p-4 section-header-box bg-light rounded-top-4">
        <h3 class="fw-bold text-dark mb-1" th:text="${department.id == 0}?'Add Department':'Edit Department'">
          <i class="bi bi-building-add text-primary me-2"></i>Add Department
        </h3>
        <p class="text-muted small mb-0">Register a new academic department node into the core college tracking grid.</p>
      </div>

      <!-- SYSTEM FORM CONFIGURATION -->
      <form th:action="@{/departments/save}" th:object="${department}" method="post">

        <div class="p-4">

          <!-- CONTAINER FOR DATA INPUTS -->
          <div class="custom-input-group shadow-sm">
            <input th:field="*{id}" type="number" hidden>
            <!-- DEPARTMENT NAME INPUT FIELD -->
            <div class="mb-0">
              <label class="form-label form-label-custom">
                <i class="bi bi-building text-secondary me-1"></i> Department Name
              </label>
              <input type="text" th:field="*{name}" class="form-control form-control-custom" 
			  placeholder="e.g., Department of Computer Science" required>
            </div>

          </div>

          <small class="text-muted d-block mt-1 px-1">
            <i class="bi bi-info-circle me-1"></i> Creating a department allows managers to allocate subsequent classes and students slots later.
          </small>

        </div>

        <!-- ACTION FOOTER TOOLBAR BUTTONS -->
        <div class="p-3 px-4 d-flex justify-content-between align-items-center action-bar-footer">
          <a href="/departments" class="btn btn-light border rounded-pill px-4 fw-semibold text-secondary">
            Cancel
          </a>
          <button type="submit" class="btn btn-success rounded-pill px-4 fw-bold shadow-sm">
            <i class="bi bi-cloud-check-fill me-1"></i> Save Department
          </button>
        </div>

      </form>

    </div>

  </div>

  <!-- Toast Auto Dismiss Script Handler -->
  <script th:if="${error}">
    window.onload = function(){
      const toast = document.getElementById("toast");
      if(toast){
        setTimeout(() => { toast.style.setProperty('display', 'none', 'important'); }, 4000);
      }
    }
  </script>	
  
  <!-- Bootstrap 5.3.3 JS Bundle CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
